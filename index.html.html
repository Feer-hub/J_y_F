<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="texto de estilos.css">
</head>
<body>
    <div class="login-container">
        <h1>Holaaa, mi niña peloncita 🏎🕷</h1>
        <form id="loginForm">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu secret name">

            <label for="password">Contraseña: </label>
            <input type="password" id="password" name="password" placeholder="Tu clave secreta">

            <input type="submit" value="Iniciar Sesión">
        </form>
    </div>

    <script>
    
        function iniciarSesion() {
            const nombre = document.getElementById('nombre').value;
            const password = document.getElementById('password').value;

              if (password === "2303") {
        alert("¡Acceso concedido!");
        // Aquí puedes redirigir a tu juego
        window.location.href = "JyF.html";
    } else {
        alert("Contraseña incorrecta, intenta de nuevo.");
            }
        }

        
        document.getElementById('password').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Evita envío automático
                iniciarSesion();
            }
        });

        // Detectar clic en el botón de enviar
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita recargar la página
            iniciarSesion();
        });
    </script>
</body>
</html>
